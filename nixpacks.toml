[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo", "php84Extensions.pdo_mysql", "php84Extensions.mbstring", "php84Extensions.xml", "php84Extensions.tokenizer", "php84Extensions.ctype", "php84Extensions.curl", "php84Extensions.gd", "php84Extensions.zip", "php84Extensions.intl", "nodejs_20", "nodePackages.npm", "unzip"]

[phases.install]
cmds = [
  "curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer",
  "composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-reqs",
  "npm install --legacy-peer-deps",
  "npm run build"
]

[phases.build]
cmds = ["php artisan config:clear"]

[start]
cmd = "php artisan migrate --force && php artisan db:seed --force && php artisan storage:link && php artisan config:cache && php artisan route:cache && php artisan view:cache && php -S 0.0.0.0:$PORT -t public"
